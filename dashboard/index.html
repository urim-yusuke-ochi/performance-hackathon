<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Hackathon - Dashboard</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #475569;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-light), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .stat-card .label {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }

    .leaderboard {
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 3rem;
    }

    .leaderboard-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .leaderboard-header h2 {
      font-size: 1.5rem;
    }

    .refresh-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .refresh-btn:hover {
      background: var(--accent-light);
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      text-align: left;
      padding: 1rem 1.5rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table tr:last-child td {
      border-bottom: none;
    }

    .leaderboard-table tr:hover {
      background: var(--bg-card);
    }

    .rank {
      font-weight: 700;
      width: 60px;
    }

    .rank-1 { color: #fbbf24; }
    .rank-2 { color: #d1d5db; }
    .rank-3 { color: #d97706; }

    .participant-name {
      font-weight: 600;
    }

    .score-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .score-bar .bar {
      flex: 1;
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
      max-width: 200px;
    }

    .score-bar .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .score-value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
    }

    .timestamp {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.5rem;
    }

    .participant-detail {
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .participant-detail h3 {
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .page-score-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      background: var(--bg-card);
      border-radius: 6px;
      font-size: 0.875rem;
    }

    .page-score-item .page-name {
      color: var(--text-secondary);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 2rem;
      color: var(--danger);
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏎️ Performance Hackathon</h1>
      <p>リアルタイム パフォーマンス リーダーボード</p>
    </header>

    <div class="stats-grid" id="stats">
      <div class="stat-card">
        <div class="label">参加者数</div>
        <div class="value" id="stat-participants">-</div>
      </div>
      <div class="stat-card">
        <div class="label">最高スコア</div>
        <div class="value" id="stat-best">-</div>
      </div>
      <div class="stat-card">
        <div class="label">平均スコア</div>
        <div class="value" id="stat-avg">-</div>
      </div>
      <div class="stat-card">
        <div class="label">最終更新</div>
        <div class="value" id="stat-updated" style="font-size:1rem;">-</div>
      </div>
    </div>

    <div class="leaderboard">
      <div class="leaderboard-header">
        <h2>🏆 リーダーボード</h2>
        <button class="refresh-btn" onclick="loadLeaderboard()">更新</button>
      </div>
      <div id="leaderboard-content">
        <div class="loading">データを読み込み中</div>
      </div>
    </div>

    <h2 style="margin-bottom:1.5rem;">📊 参加者別詳細スコア</h2>
    <div class="detail-grid" id="details">
    </div>

    <footer>
      <p>Auto-refresh: 60秒ごと | Powered by Lighthouse CI + AWS</p>
    </footer>
  </div>

  <script>
    const SCORES_API_BASE = './leaderboard.json';
    const SCORES_DETAIL_BASE = './scores';
    const MAX_SCORE = 900;

    function getScoreColor(score) {
      const ratio = score / MAX_SCORE;
      if (ratio >= 0.7) return '#10b981';
      if (ratio >= 0.4) return '#f59e0b';
      return '#ef4444';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleString('ja-JP', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function renderLeaderboard(data) {
      if (!data || !data.leaderboard || data.leaderboard.length === 0) {
        return '<div class="no-data">まだスコアデータがありません</div>';
      }

      let html = '<table class="leaderboard-table"><thead><tr>';
      html += '<th>順位</th><th>参加者</th><th>スコア</th><th>計測日時</th>';
      html += '</tr></thead><tbody>';

      data.leaderboard.forEach((entry, idx) => {
        const rank = idx + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const ratio = (entry.total_score / MAX_SCORE) * 100;
        const color = getScoreColor(entry.total_score);

        html += `<tr>
          <td class="rank ${rankClass}">#${rank}</td>
          <td class="participant-name">${escapeHtml(entry.participant_id)}</td>
          <td>
            <div class="score-bar">
              <div class="bar"><div class="bar-fill" style="width:${ratio}%;background:${color}"></div></div>
              <span class="score-value">${entry.total_score.toFixed(1)} / ${MAX_SCORE}</span>
            </div>
          </td>
          <td class="timestamp">${formatDate(entry.measured_at)}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      return html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadParticipantDetail(participantId) {
      try {
        const res = await fetch(`${SCORES_DETAIL_BASE}/${participantId}/latest.json`);
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    async function renderDetails(leaderboard) {
      const container = document.getElementById('details');
      if (!leaderboard || leaderboard.length === 0) {
        container.innerHTML = '<div class="no-data">詳細データなし</div>';
        return;
      }

      let html = '';
      for (const entry of leaderboard) {
        const detail = await loadParticipantDetail(entry.participant_id);
        if (!detail || !detail.pages) continue;

        html += `<div class="participant-detail">
          <h3>👤 ${escapeHtml(entry.participant_id)}</h3>
          <div class="page-scores">`;

        for (const page of detail.pages) {
          const score = page.score || 0;
          const color = getScoreColor(score * 9); // normalize to 900 scale for color
          html += `<div class="page-score-item">
            <span class="page-name">${escapeHtml(page.page)}</span>
            <span style="color:${color};font-weight:600">${score.toFixed(1)}/100</span>
          </div>`;
        }

        html += '</div></div>';
      }

      container.innerHTML = html || '<div class="no-data">詳細データなし</div>';
    }

    async function loadLeaderboard() {
      const content = document.getElementById('leaderboard-content');
      content.innerHTML = '<div class="loading">データを読み込み中</div>';

      try {
        const res = await fetch(SCORES_API_BASE + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Update stats
        document.getElementById('stat-participants').textContent = data.participants || 0;

        if (data.leaderboard && data.leaderboard.length > 0) {
          const scores = data.leaderboard.map(e => e.total_score);
          document.getElementById('stat-best').textContent = Math.max(...scores).toFixed(1);
          document.getElementById('stat-avg').textContent = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
        }

        document.getElementById('stat-updated').textContent = formatDate(data.updated_at);

        // Render leaderboard
        content.innerHTML = renderLeaderboard(data);

        // Render details
        await renderDetails(data.leaderboard);

      } catch (err) {
        content.innerHTML = `<div class="error">データの読み込みに失敗しました: ${err.message}</div>`;
      }
    }

    // Initial load
    loadLeaderboard();

    // Auto-refresh every 60 seconds
    setInterval(loadLeaderboard, 60000);
  </script>
</body>
</html>
